name: Cleanup Old Files

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete Files Older Than 1 Day
        run: |
          cd releases
          NOW=$(date +%s)
          
          # --- STEP 1: Hapus berdasarkan umur berkas commit .json ---
          for file in *.json; do
            if [[ "$file" == *-status.json ]]; then
              continue
            fi
            
            [ -f "$file" ] || continue

            LAST_COMMIT=$(git log -1 --format=%ct -- "$file")

            if [ -z "$LAST_COMMIT" ]; then
              LAST_COMMIT=$(stat -c %Y "$file")
            fi

            AGE=$((NOW - LAST_COMMIT))

            if [ $AGE -gt 86400 ]; then
              BASE="${file%.json}"

              rm -f "${BASE}.apk"
              rm -f "${BASE}.aab"
              rm -f "${BASE}.zip"
              rm -f "${BASE}.json"
              rm -f "${BASE}-status.json"

              echo "Deleted paired files for: $BASE"
            fi
          done

          # --- STEP 2: Sapu bersih file Orphan (tanpa pasangan .json) ---
          # Menggunakan mtime +1 (lebih dari 24 jam sejak modifikasi terakhir)
          echo "Cleaning up orphan files..."
          find . -type f -name "*.apk" -mtime +1 -delete
          find . -type f -name "*.aab" -mtime +1 -delete
          find . -type f -name "*.zip" -mtime +1 -delete
          
          # Opsional: Sekaligus membersihkan file ".json" rusak yang Anda sebutkan
          find . -type f -name ".json" -delete 

          cd ..

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if ! git diff --cached --quiet; then
            git commit -m "Auto cleanup old files and orphans"
            git push
          fi
