name: Cleanup Old Files

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

# Menambahkan izin write agar github-actions bisa melakukan push kembali ke repo
permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Wajib agar git log bisa membaca riwayat commit lama

      - name: Delete Files Older Than 1 Day
        run: |
          cd releases
          NOW=$(date +%s)
          for file in *.json; do
            # Lewati jika file berakhiran -status.json agar tidak diproses dua kali sebagai acuan
            if [[ "$file" == *-status.json ]]; then
              continue
            fi
            
            [ -f "$file" ] || continue

            LAST_COMMIT=$(git log -1 --format=%ct -- "$file")

            # Fallback jika file belum pernah di-commit, gunakan waktu modifikasi file
            if [ -z "$LAST_COMMIT" ]; then
              LAST_COMMIT=$(stat -c %Y "$file")
            fi

            AGE=$((NOW - LAST_COMMIT))

            if [ $AGE -gt 86400 ]; then
              BASE="${file%.json}"

              # Menghapus semua variasi berkas terkait
              rm -f "${BASE}.apk"
              rm -f "${BASE}.aab"
              rm -f "${BASE}.zip"
              rm -f "${BASE}.json"
              rm -f "${BASE}-status.json"

              echo "Deleted $BASE and its status file"
            fi
          done
          cd ..

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if ! git diff --cached --quiet; then
            git commit -m "Auto cleanup old files"
            git push
          fi
