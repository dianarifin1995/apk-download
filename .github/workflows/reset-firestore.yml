name: Reset Firestore Daily

on:
  schedule:
    # 00:00 WIB = 17:00 UTC
    - cron: "0 17 * * *"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  reset-firestore:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase Admin
        run: npm install firebase-admin

      - name: Create cleanup script
        run: |
          cat > cleanup.js <<'EOF'
          const admin = require("firebase-admin");

          const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);

          admin.initializeApp({
            credential: admin.credential.cert(serviceAccount)
          });

          const db = admin.firestore();

          async function deleteCollection(collectionName) {
            const snapshot = await db.collection(collectionName).get();

            if (snapshot.empty) {
              console.log("Collection kosong.");
              return;
            }

            while (true) {
              const snap = await db.collection(collectionName).limit(450).get();

              if (snap.empty) break;

              const batch = db.batch();

              snap.docs.forEach(doc => {
                batch.delete(doc.ref);
              });

              await batch.commit();

              console.log(`Deleted ${snap.size} documents`);
            }

            console.log("Collection berhasil dibersihkan.");
          }

          deleteCollection("builds")
            .then(() => {
              console.log("Selesai.");
              process.exit(0);
            })
            .catch(err => {
              console.error(err);
              process.exit(1);
            });
          EOF

      - name: Reset Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node cleanup.js
